name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate shell scripts
        run: |
          bash -n install.sh
          bash -n twn

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import re

          expected = os.environ["RELEASE_TAG"].removeprefix("v")
          source = Path("twn_toolkit/version.py").read_text(encoding="utf-8")
          match = re.search(r'^APP_VERSION\s*=\s*["\']([^"\']+)["\']', source, re.MULTILINE)
          if not match:
              raise SystemExit("APP_VERSION was not found in twn_toolkit/version.py")
          actual = match.group(1)
          if actual != expected:
              raise SystemExit(f"Tag {os.environ['RELEASE_TAG']} does not match APP_VERSION {actual}")
          print(f"Release tag matches APP_VERSION {actual}")
          PY

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Audit pinned dependencies
        run: |
          python -m pip install pip-audit==2.10.1
          python -m pip_audit -r requirements.txt \
            --ignore-vuln PYSEC-2026-2858 \
            --ignore-vuln GHSA-cq46-m9x9-j8w2

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q twn_toolkit tests

      - name: Run test suite
        run: python -m unittest discover -s tests -v
